services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dockertest-api
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-net

  web:
    build: .
    container_name: dockertest-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
