<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DockerTest</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      main {
        width: min(90vw, 560px);
        padding: 32px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: white;
        box-shadow: 0 16px 40px rgb(15 23 42 / 8%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DockerTest</h1>
      <p>Este sitio se está sirviendo desde un contenedor Docker con Nginx.</p>
    </main>
  </body>
</html>
